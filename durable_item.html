    <style>

        /* การตั้งค่าให้ Loader บังเต็มหน้าจอ */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.9); /* สีขาวโปร่งใส */
            z-index: 9999; /* กำหนดให้อยู่บนสุดเสมอ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, visibility 0.4s ease; /* เอฟเฟกต์ตอนจางหาย */
        }

        /* การสร้างวงกลมหมุนๆ (Spinner) */
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3; /* สีขอบพื้นหลัง */
            border-top: 6px solid #0d6efd; /* สีขอบที่วิ่งหมุนๆ (สีน้ำเงิน) */
            border-radius: 50%;
            animation: spin 1s linear infinite; /* สั่งให้หมุนต่อเนื่อง */
        }

        /* อนิเมชันการหมุน */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* คลาสสำหรับซ่อน Loader เมื่อโหลดเสร็จ */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
        }

        body {
            background-color: #f8f9fa; /* สีพื้นหลังอ่อนๆ ให้ตัว Card โดดเด่นขึ้น */
            font-family: 'Kanit', sans-serif;
        }
    </style>

    <script>

    window.addEventListener('load', function() {
        const loader = document.getElementById('pageLoader');
        // เพิ่มคลาส loader-hidden เพื่อให้ CSS สั่งให้มันจางหายไป
        loader.classList.add('loader-hidden');
    });

    const qtyInput = document.getElementById('quantity');
    const priceInput = document.getElementById('price');
    const totalInput = document.getElementById('totalCost');

    function calculateTotalCost() {
        const quantity = parseInt(qtyInput.value) || 0;
        const price = parseFloat(priceInput.value) || 0;
        const totalCost = quantity * price;
        totalInput.value = totalCost.toFixed(2);
    }

    qtyInput.addEventListener('input', calculateTotalCost);
    priceInput.addEventListener('input', calculateTotalCost);

    </script>
