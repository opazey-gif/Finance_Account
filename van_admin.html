    <script>
        // ข้อมูลทะเบียนรถจำแนกตามประเภท
        var VEHICLE_PLATES = {
            'รถตู้': [
                { plate: 'ฮม 7061 กรุงเทพมหานคร', label: '🚐 ฮม 7061 กทม. – Ventury 1' },
                { plate: 'นฆ 8584 กรุงเทพมหานคร', label: '🚐 นฆ 8584 กทม. – Commuter' }
            ],
            'รถเก๋ง': [
                { plate: '5 ขย 1543 กรุงเทพมหานคร', label: '🚘 5 ขย 1543 กทม. – MG' },
                { plate: '5 ขพ 9069 กรุงเทพมหานคร', label: '🚘 5 ขพ 9069 กทม. – Camry' },
                { plate: '2 กฌ 8028 กรุงเทพมหานคร', label: '🚘 2 กฌ 8028 กทม. – Fortuner' }
            ],
            'รถกระบะ': [
                { plate: '2 ฒง 9930 กรุงเทพมหานคร', label: '🛻 2 ฒง 9930 กทม. – Revo' }
            ]
        };

        function updatePlateOptions() {
            var type = document.getElementById('v_vehicle').value;
            var plateSel = document.getElementById('v_plate');
            plateSel.innerHTML = '';
            var plates = VEHICLE_PLATES[type] || [];
            plates.forEach(function(p) {
                var opt = document.createElement('option');
                opt.value = p.plate;
                opt.textContent = p.label;
                plateSel.appendChild(opt);
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            flatpickr("#v_date", {
                dateFormat: "d/m/Y",
                locale: "th"
            });
            updatePlateOptions(); // populate ครั้งแรก

            // Auto-format เวลา: พิมพ์ตัวเลข 4 ตัวแล้วใส่ : ให้อัตโนมัติ เช่น 0830 → 08:30
            ['v_time', 'v_time_finish'].forEach(function(id) {
                const el = document.getElementById(id);
                el.addEventListener('input', function() {
                    let val = this.value.replace(/[^0-9]/g, '');
                    if (val.length >= 3) {
                        val = val.slice(0, 2) + ':' + val.slice(2, 4);
                    }
                    this.value = val;
                });
                el.addEventListener('blur', function() {
                    const match = this.value.match(/^(\d{1,2}):?(\d{2})$/);
                    if (match) {
                        const h = parseInt(match[1]);
                        const m = parseInt(match[2]);
                        if (h >= 0 && h <= 23 && m >= 0 && m <= 59) {
                            this.value = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
                            this.classList.remove('border-rose-400');
                            return;
                        }
                    }
                    if (this.value) this.classList.add('border-rose-400');
                });
            });
        });

        function assignJob() {
            const btn = document.getElementById('btnSubmit');
            const statusDiv = document.getElementById('statusMessage');
            
            const tripTypeEl = document.querySelector('input[name="v_trip_type"]:checked');

            const data = {
                customerName: document.getElementById('v_customer').value,
                pickup: document.getElementById('v_pickup').value,
                destination: document.getElementById('v_destination').value,
                travelDate: document.getElementById('v_date').value,
                time: document.getElementById('v_time').value,
                timeFinish: document.getElementById('v_time_finish').value,
                vehicleType: document.getElementById('v_vehicle').value,
                plateNumber: document.getElementById('v_plate').value,
                driverEmail: document.getElementById('v_driver').value,
                tripType: tripTypeEl ? tripTypeEl.value : ''
            };

            // ตรวจสอบความครบถ้วนของข้อมูล
            if(!data.customerName || !data.pickup || !data.destination || !data.travelDate || !data.time || !data.timeFinish || !data.plateNumber || !data.driverEmail) {
                statusDiv.style.display = 'block';
                statusDiv.className = "text-center mt-4 text-rose-500 text-sm font-medium p-3 bg-rose-50 rounded-lg";
                statusDiv.innerHTML = "⚠️ กรุณากรอกข้อมูลนัดหมายและเลือกเวลารับ-ส่งกลับให้ครบถ้วนทุกช่อง";
                return;
            }

            if(!data.tripType) {
                statusDiv.style.display = 'block';
                statusDiv.className = "text-center mt-4 text-rose-500 text-sm font-medium p-3 bg-rose-50 rounded-lg";
                statusDiv.innerHTML = "⚠️ กรุณาเลือกประเภทการเดินทาง";
                return;
            }

            btn.disabled = true;
            btn.innerHTML = "⏳ กำลังบันทึกและส่งข้อมูลให้คนขับ...";
            statusDiv.style.display = 'block';
            statusDiv.className = "text-center mt-4 text-amber-500 text-sm font-medium";
            statusDiv.innerHTML = "กำลังบันทึกข้อมูลลงระบบ Google Sheets...";

            if (typeof google === 'undefined') {
                setTimeout(() => {
                    alert("บันทึกสำเร็จ (Mockup)");
                    btn.disabled = false;
                    btn.innerHTML = "🚀 ยืนยันการจ่ายงาน (Assign Job)";
                    statusDiv.style.display = 'none';
                }, 1000);
                return;
            }

            // ส่งข้อมูลบันทึกใน Google Sheets ผ่านฝั่ง Server
            google.script.run.withSuccessHandler(res => {
                Swal.fire('มอบหมายงานรถยนต์สำเร็จ!', res, 'success').then(() => {
                    navigateTo('van_admin_summary'); 
                });
            }).withFailureHandler(err => {
                statusDiv.className = "text-center mt-4 text-rose-500 text-sm font-medium p-3 bg-rose-50 rounded-lg";
                statusDiv.innerHTML = "❌ เกิดข้อผิดพลาด: " + err;
                btn.disabled = false;
                btn.innerHTML = "🚀 ยืนยันการจ่ายงาน (Assign Job)";
            }).saveVanJob(data);
        }
    </script>
