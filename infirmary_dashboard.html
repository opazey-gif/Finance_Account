    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f8ff; padding-bottom: 50px; }
        .hosp-header { background: linear-gradient(135deg, #0284c7, #0ea5e9); color: white; padding: 1rem 0; border-bottom: 5px solid #f97316; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .border-orange::before { background-color: #f97316; }

        .stat-value { font-size: 2.5rem; font-weight: 600; color: #1e293b; line-height: 1; margin: 10px 0; }

<body>

    <div id="pageLoader">
        <div class="spinner"></div>
        <p class="loader-message">กำลังประมวลผลข้อมูลกราฟ...</p>
    </div>



    <!-- ===== PAGE ACTION BAR ===== -->
    <div class="container mb-3 mt-2">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 p-3"
             style="background:white;border-radius:1rem;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04);">
            <div>
                <h5 class="mb-0 fw-bold" style="color:#0369a1;">
                    <i class="bi bi-pie-chart-fill me-2"></i>แดชบอร์ดห้องพยาบาล
                </h5>
                <small class="text-muted">สรุปสถิติการใช้บริการ</small>
            </div>
            <button class="btn fw-bold shadow-sm px-4 py-2" 
                    onclick="navigateTo('infirmary_form')"
                    style="background:var(--primary-orange);color:white;border-radius:10px;">
                <i class="bi bi-plus-circle-fill me-2"></i>บันทึกการเข้าใช้
            </button>
        </div>
    </div>

    <div class="container">
        
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card border-blue">
                    <div class="stat-label"><i class="bi bi-calendar-check"></i> วันที่และเวลาปัจจุบัน</div>
                    <div class="stat-value" id="realTimeClock" style="font-size: 1.8rem; color: #0284c7;">--:--:--</div>
                    <div class="stat-label text-primary" id="realTimeDate">--/--/----</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card border-yellow">
                    <div class="stat-label"><i class="bi bi-person-plus"></i> ผู้รับบริการวันนี้</div>
                    <div class="stat-value text-warning" id="valToday">0</div>
                    <div class="stat-label">คน</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card border-orange">
                    <div class="stat-label"><i class="bi bi-people"></i> ผู้รับบริการสะสมทั้งหมด</div>
                    <div class="stat-value text-danger" id="valTotal">0</div>
                    <div class="stat-label">คน</div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-lg-7">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-activity"></i> Top 5 กลุ่มโรคที่พบบ่อยที่สุด</div>
                    <canvas id="diseaseChart" height="250"></canvas>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-building"></i> Top 3 หน่วยงานที่ใช้บริการสูงสุด</div>
                    <canvas id="deptChart" height="250"></canvas>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-12">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-capsule"></i> สถิติการเบิกจ่ายยา (มากไปน้อย)</div>
                    <canvas id="medChart" height="100"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. ระบบนาฬิกา Real-time
        setInterval(() => {
            const now = new Date();
            document.getElementById('realTimeDate').innerText = now.toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' });
            document.getElementById('realTimeClock').innerText = now.toLocaleTimeString('th-TH');
        }, 1000);

        // 2. ตั้งค่า Default ของ Chart.js ให้สวยงามและมีอนิเมชั่น
        Chart.defaults.font.family = "'Prompt', sans-serif";
        Chart.defaults.color = '#64748b';
        Chart.defaults.plugins.tooltip.padding = 10;
        Chart.defaults.plugins.tooltip.cornerRadius = 8;
        
        let diseaseChart, deptChart, medChart;

        // 3. ฟังก์ชันดึงข้อมูลจาก Google Sheets และวาดกราฟ
        function loadDashboardData() {
            google.script.run
                .withSuccessHandler(function(response) {
                    if(response.status === "error") {
                        alert("เกิดข้อผิดพลาด: " + response.message);
                        return;
                    }
                    
                    // ปิดหน้าจอโหลด
                    hideLoader();

                    // อัปเดตตัวเลข
                    document.getElementById('valToday').innerText = response.todayCases;
                    document.getElementById('valTotal').innerText = response.totalCases;

                    // วาดกราฟ 1: Top 5 กลุ่มโรค (Bar Chart แนวตั้ง)
                    const diseaseCtx = document.getElementById('diseaseChart').getContext('2d');
                    diseaseChart = new Chart(diseaseCtx, {
                        type: 'bar',
                        data: {
                            labels: response.topDiseases.map(d => d.name),
                            datasets: [{
                                label: 'จำนวนผู้ป่วย (คน)',
                                data: response.topDiseases.map(d => d.count),
                                backgroundColor: 'rgba(14, 165, 233, 0.7)', // สีฟ้า
                                borderColor: 'rgba(14, 165, 233, 1)',
                                borderWidth: 1,
                                borderRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            animation: { duration: 1500, easing: 'easeOutBounce' },
                            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                        }
                    });

                    // วาดกราฟ 2: Top 3 หน่วยงาน (Doughnut Chart)
                    const deptCtx = document.getElementById('deptChart').getContext('2d');
                    deptChart = new Chart(deptCtx, {
                        type: 'doughnut',
                        data: {
                            labels: response.topDepts.map(d => d.name),
                            datasets: [{
                                data: response.topDepts.map(d => d.count),
                                backgroundColor: ['#f97316', '#eab308', '#38bdf8', '#fbbf24', '#fdba74'], // โทนส้ม-เหลือง-ฟ้า
                                hoverOffset: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            animation: { duration: 1500, animateScale: true, animateRotate: true },
                            plugins: { legend: { position: 'bottom' } }
                        }
                    });

                    // วาดกราฟ 3: ยาที่เบิกจ่าย (Horizontal Bar Chart แนวนอน)
                    const medCtx = document.getElementById('medChart').getContext('2d');
                    medChart = new Chart(medCtx, {
                        type: 'bar',
                        data: {
                            labels: response.topMeds.map(d => d.name),
                            datasets: [{
                                label: 'จำนวนครั้งที่เบิกจ่าย',
                                data: response.topMeds.map(d => d.count),
                                backgroundColor: 'rgba(249, 115, 22, 0.7)', // สีส้ม
                                borderColor: 'rgba(249, 115, 22, 1)',
                                borderWidth: 1,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            indexAxis: 'y', // ทำให้เป็นกราฟแนวนอน
                            responsive: true,
                            animation: { duration: 2000, easing: 'easeOutQuart' },
                            scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
                            plugins: { legend: { display: false } }
                        }
                    });

                })
                .withFailureHandler(function(error) {
                    alert("ไม่สามารถโหลดข้อมูลได้: " + error);
                    hideLoader();
                })
                .getInfirmaryDashboardData();
        }

        // ให้เริ่มดึงข้อมูลทันทีเมื่อโหลดหน้าเว็บ
        setTimeout(() => {
            if (typeof google !== 'undefined' && google.script && google.script.run) {
                loadDashboardData();
            } else {
                // ถ้าบังเอิญ 0.8 วิแล้วยังไม่พร้อม ให้โหลดหน้าเว็บใหม่เลยเพื่อแก้บั๊กจอค้าง
                console.error("Google Script ไม่พร้อมทำงาน");
                location.reload(); 
            }
        }, 1000);

    </script>

    <!-- =============== INCLUDE CENTRAL SCRIPTS =============== -->
