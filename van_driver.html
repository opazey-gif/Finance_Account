<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบพนักงานขับรถ</title>
    
    <!-- ดึงการตั้งค่า Tailwind CSS และ Fonts จากไฟล์ส่วนกลาง Common_CSS_TW -->
    <?!= include('Common_CSS_TW'); ?>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .job-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #f1f5f9;
        }
        .job-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 12px 20px rgba(249, 115, 22, 0.12); 
            border-color: #fdba74; 
        }
        
        .status-badge { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .status-Assigned { background-color: #fef3c7; color: #d97706; }
        .status-Accepted { background-color: #e0f2fe; color: #0284c7; }
        .status-Completed { background-color: #dcfce3; color: #16a34a; }
    </style>
</head>
<body class="text-slate-700 bg-slate-50 min-h-screen pb-12">

    <!-- Navbar ส่วนกลาง -->
    <?!= include('Common_Navbar'); ?>

    <div class="max-w-md mx-auto px-4 py-6">
        <!-- Header พนักงานขับรถ -->
        <div class="bg-white rounded-2xl p-6 shadow-sm mb-6 border border-slate-100">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center text-2xl font-bold">
                    🚐
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800" id="driverName">กำลังโหลดข้อมูล...</h2>
                    <p class="text-sm text-slate-400" id="driverEmail">-</p>
                    <span class="inline-block mt-2 px-3 py-1 bg-orange-50 text-orange-600 text-xs font-semibold rounded-full border border-orange-100">
                        พนักงานขับรถ (Driver)
                    </span>
                </div>
            </div>
        </div>

        <!-- Navigation Tab -->
        <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
            <button id="tabActive" onclick="switchTab('active')" class="flex-1 py-2.5 text-sm font-semibold rounded-lg text-orange-600 bg-white shadow-sm transition">
                งานที่ต้องทำ
            </button>
            <button id="tabHistory" onclick="switchTab('history')" class="flex-1 py-2.5 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition">
                ประวัติงานวิ่ง
            </button>
        </div>

        <!-- รายการงาน -->
        <div id="jobList" class="space-y-4">
            <div class="text-center py-12">
                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-orange-500 mx-auto mb-3"></div>
                <p class="text-sm text-slate-400">⏳ กำลังโหลดรายการงาน...</p>
            </div>
        </div>
    </div>

    <!-- Modal สำหรับปิดงานแบบครบวงจร -->
    <div id="closeJobModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-100 flex flex-col">
            <!-- Modal Header -->
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <h3 class="font-bold text-lg text-slate-800 flex items-center gap-2">🏁 สรุปปิดงานวิ่งรถ</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
            </div>
            
            <!-- Modal Body (Form) -->
            <div class="p-5 space-y-4">
                <!-- เลขไมล์ -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">เลขไมล์เริ่มต้น</label>
                        <input type="number" id="c_startMile" oninput="calculateDistance()" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">เลขไมล์สิ้นสุด</label>
                        <input type="number" id="c_endMile" oninput="calculateDistance()" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="0">
                    </div>
                </div>

                <!-- ระยะทางวิ่ง (Auto-calculate) -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ระยะทางวิ่งสุทธิ (กิโลเมตร)</label>
                    <input type="number" id="c_distance" class="w-full px-3 py-2 text-sm border rounded-lg bg-slate-50 font-bold text-orange-600 focus:outline-none" readonly value="0">
                </div>

                <!-- ค่าน้ำมัน & ค่าทางด่วน -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">ค่าน้ำมัน (บาท)</label>
                        <input type="number" id="c_fuel" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">ค่าทางด่วน (บาท)</label>
                        <input type="number" id="c_toll" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="0">
                    </div>
                </div>

                <!-- ค่าที่จอดรถ -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ค่าที่จอดรถ (บาท)</label>
                    <input type="number" id="c_parking" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="0" value="0">
                </div>

                <!-- เบี้ยเลี้ยง -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">เบี้ยเลี้ยง (บาท)</label>
                    <input type="number" id="c_allowance" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="0" value="0">
                </div>

                <!-- หมายเหตุการเดินทาง / ค่าซ่อมรถ -->
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">หมายเหตุการเดินทาง / ค่าซ่อมรถ</label>
                    <textarea id="c_note" rows="2" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="ระบุรายละเอียดเพิ่มเติม หรือรายละเอียดซ่อมบำรุงในงานนี้ (ถ้ามี)"></textarea>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="p-4 border-t border-slate-100 bg-slate-50 rounded-b-2xl grid grid-cols-2 gap-3">
                <button onclick="closeModal()" class="w-full py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-xl transition">
                    ยกเลิก
                </button>
                <button id="btnSubmitClose" onclick="submitCloseJob()" class="w-full py-2.5 text-sm font-semibold text-white bg-orange-500 hover:bg-orange-600 rounded-xl shadow-md transition">
                    ยืนยันปิดงาน
                </button>
            </div>
        </div>
    </div>

    <!-- ดึง JS หลักมาใช้ (ระบบ Alert & สลับหน้า) -->
    <?!= include('Common_JS'); ?>

    <script>
        var allJobs = [];
        var currentTab = 'active'; // 'active' หรือ 'history'
        var activeJobId = null;

        document.addEventListener('DOMContentLoaded', function() {
            // โหลดโปรไฟล์คนขับ
            if (typeof google !== 'undefined') {
                google.script.run
                    .withSuccessHandler(function(profile) {
                        document.getElementById('driverName').textContent = profile.name;
                        document.getElementById('driverEmail').textContent = profile.email;
                    })
                    .getUserProfile();
            }
            refreshData();
        });

        function refreshData() {
            if (typeof google === 'undefined') return;
            google.script.run
                .withSuccessHandler(function(jobs) {
                    allJobs = jobs || [];
                    renderJobs();
                })
                .getDriverVanJobs();
        }

        function switchTab(tab) {
            currentTab = tab;
            const tabActiveBtn = document.getElementById('tabActive');
            const tabHistoryBtn = document.getElementById('tabHistory');

            if (tab === 'active') {
                tabActiveBtn.className = "flex-1 py-2.5 text-sm font-semibold rounded-lg text-orange-600 bg-white shadow-sm transition";
                tabHistoryBtn.className = "flex-1 py-2.5 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition";
            } else {
                tabHistoryBtn.className = "flex-1 py-2.5 text-sm font-semibold rounded-lg text-orange-600 bg-white shadow-sm transition";
                tabActiveBtn.className = "flex-1 py-2.5 text-sm font-semibold rounded-lg text-slate-500 hover:text-slate-700 transition";
            }
            renderJobs();
        }

        function renderJobs() {
            const listDiv = document.getElementById('jobList');
            let filtered = [];

            if (currentTab === 'active') {
                filtered = allJobs.filter(j => j.status !== 'Completed');
            } else {
                filtered = allJobs.filter(j => j.status === 'Completed');
            }

            if (filtered.length === 0) {
                listDiv.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200">
                        <span class="text-3xl block mb-2">📭</span>
                        <p class="text-sm text-slate-400">ไม่มีรายการงานในขณะนี้</p>
                    </div>`;
                return;
            }

            let html = '';
            filtered.forEach(job => {
                let actionBtn = '';
                let cardClickAction = '';
                
                if (job.status === 'Assigned') {
                    // ✅ ล็อคไม่ให้รับงานล่วงหน้าเกิน 1 วัน
                    const jobDateParts = job.date.split('/');
                    let canAccept = true;
                    let lockMsg = '';
                    if (jobDateParts.length === 3) {
                        // วันที่จาก sheet เป็น dd/mm/yyyy (พ.ศ.) → แปลงเป็น ค.ศ.
                        const jobDate = new Date(
                            parseInt(jobDateParts[2]) - 543,
                            parseInt(jobDateParts[1]) - 1,
                            parseInt(jobDateParts[0])
                        );
                        const today = new Date();
                        today.setHours(0, 0, 0, 0);
                        const tomorrow = new Date(today);
                        tomorrow.setDate(today.getDate() + 1);
                        tomorrow.setHours(23, 59, 59, 999);
                        if (jobDate > tomorrow) {
                            canAccept = false;
                            lockMsg = `เปิดรับงานได้ในวันที่ ${job.date}`;
                        }
                    }
                    if (canAccept) {
                        actionBtn = `
                            <button onclick="acceptJob('${job.id}')" class="w-full mt-4 py-2 bg-orange-500 hover:bg-orange-600 text-white text-sm font-semibold rounded-xl shadow-md transition">
                                🤝 ยอมรับงานนี้
                            </button>`;
                    } else {
                        actionBtn = `
                            <div class="w-full mt-4 py-2 bg-slate-100 text-slate-400 text-sm font-semibold rounded-xl text-center border border-slate-200 cursor-not-allowed">
                                🔒 ${lockMsg}
                            </div>`;
                    }
                } else if (job.status === 'Accepted') {
                    actionBtn = `
                        <button onclick="openCloseModal('${job.id}', ${job.startMile || 0})" class="w-full mt-4 py-2 bg-rose-500 hover:bg-rose-600 text-white text-sm font-semibold rounded-xl shadow-md transition">
                            🏁 ทำการปิดงานวิ่ง
                        </button>`;
                } else if (job.status === 'Completed') {
                    // สำหรับงานที่เสร็จสิ้นแล้ว สามารถคลิกดูรายละเอียดของงานได้
                    cardClickAction = `onclick="viewJobDetails('${job.id}')"`;
                    actionBtn = `
                        <button onclick="viewJobDetails('${job.id}')" class="w-full mt-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-semibold rounded-xl border border-slate-200 transition flex items-center justify-center gap-1.5">
                            <i class="fas fa-search-plus text-slate-400"></i> ดูรายละเอียดงาน
                        </button>`;
                }

                html += `
                    <div ${cardClickAction} class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 job-card ${job.status === 'Completed' ? 'cursor-pointer' : ''}">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs font-bold text-slate-400 font-mono">ID: ${job.id}</span>
                            <span class="status-badge status-${job.status}">${job.status === 'Assigned' ? 'รอคนรับงาน' : job.status === 'Accepted' ? 'กำลังดำเนินการ' : 'สำเร็จแล้ว'}</span>
                        </div>
                        <h4 class="font-bold text-slate-800 text-base mb-1">📍 ${job.destination}</h4>
                        <p class="text-sm text-slate-500 mb-3">👤 ผู้ประสานงาน: ${job.customer}</p>
                        
                        <div class="grid grid-cols-2 gap-2 text-xs text-slate-400 bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <div>📅 วันเดินทาง: <span class="font-semibold text-slate-600">${job.date}</span></div>
                            <div>🛣️ กิโลเมตรที่ใช้: <span class="font-semibold text-orange-600 font-bold">${job.distance || 0} กม.</span></div>
                        </div>
                        ${actionBtn}
                    </div>`;
            });
            listDiv.innerHTML = html;
        }

        // ฟังก์ชันคลิกดูรายละเอียดงานแบบ Popup อย่างเป็นระบบ
        function viewJobDetails(jobId) {
            const job = allJobs.find(j => j.id === jobId);
            if (!job) return;

            Swal.fire({
                title: `<span class='font-bold text-slate-800 text-lg'>📋 รายละเอียดงาน ${job.id}</span>`,
                html: `
                    <div class="text-left text-sm space-y-2.5 mt-4 max-h-96 overflow-y-auto">
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">ผู้เดินทาง/ลูกค้า:</strong> <span class="font-medium text-slate-700">${job.customer}</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">ปลายทาง:</strong> <span class="font-medium text-slate-700">${job.destination}</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">วันที่ออกเดินทาง:</strong> <span class="font-medium text-slate-700">${job.date}</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">เลขไมล์เริ่มต้น:</strong> <span class="font-bold text-slate-700">${job.startMile || 0} กม.</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">เลขไมล์สิ้นสุด:</strong> <span class="font-bold text-slate-700">${job.endMile || 0} กม.</span></div>
                        <div class="flex justify-between border-b pb-2 bg-orange-50/50 p-2 rounded-lg"><strong class="text-orange-700 font-bold">ระยะทางสุทธิ:</strong> <span class="font-extrabold text-orange-600">${job.distance || 0} กม.</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">ค่าน้ำมัน:</strong> <span class="font-bold text-slate-700">฿${(job.fuel || 0).toLocaleString()}</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">ค่าทางด่วน:</strong> <span class="font-bold text-slate-700">฿${(job.toll || 0).toLocaleString()}</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">ค่าที่จอดรถ:</strong> <span class="font-bold text-slate-700">฿${(job.parking || 0).toLocaleString()}</span></div>
                        <div class="flex justify-between border-b pb-2"><strong class="text-slate-500">เบี้ยเลี้ยงคนขับ:</strong> <span class="font-bold text-green-600">฿${(job.allowance || 0).toLocaleString()}</span></div>
                        <div class="flex flex-col bg-slate-50 p-2.5 rounded-lg border"><strong class="text-slate-500 text-xs mb-1">หมายเหตุการเดินทาง / ค่าซ่อมรถ:</strong> <span class="text-slate-700 font-medium whitespace-pre-wrap">${job.note || 'ไม่มีหมายเหตุ'}</span></div>
                    </div>
                `,
                confirmButtonColor: '#f97316',
                confirmButtonText: 'ปิดหน้าต่าง'
            });
        }

        // ฟังก์ชันกดยอมรับงาน
        function acceptJob(jobId) {
            Swal.fire({
                title: 'กดยอมรับงานวิ่งรถ?',
                text: "คุณกำลังยืนยันเพื่อรับงานรหัส " + jobId,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#f97316',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'ใช่, ยอมรับงานนี้',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    google.script.run
                        .withSuccessHandler(function(res) {
                            // อัพเดต status ใน local array ทันทีโดยไม่ต้องรอ server refresh
                            const job = allJobs.find(j => j.id === jobId);
                            if (job) job.status = 'Accepted';
                            renderJobs();
                            Swal.fire('สำเร็จ!', res, 'success').then(() => {
                                refreshData(); // sync กับ server หลัง alert ปิด
                            });
                        })
                        .withFailureHandler(function(err) {
                            Swal.fire('เกิดข้อผิดพลาด', err.toString(), 'error');
                        })
                        .acceptVanJob(jobId);
                }
            });
        }

        // เปิด Modal เพื่อระบุตัวเลขปิดงาน
        function openCloseModal(jobId, startMile) {
            activeJobId = jobId;
            document.getElementById('c_startMile').value = startMile || 0;
            document.getElementById('c_endMile').value = '';
            document.getElementById('c_distance').value = 0;
            document.getElementById('c_fuel').value = '';
            document.getElementById('c_toll').value = '';
            document.getElementById('c_parking').value = 0; 
            document.getElementById('c_allowance').value = 0; 
            document.getElementById('c_note').value = ''; 
            
            document.getElementById('closeJobModal').classList.remove('hidden');
        }

        // ปิด Modal
        function closeModal() {
            document.getElementById('closeJobModal').classList.add('hidden');
        }

        // คำนวณระยะทางสุทธิ
        function calculateDistance() {
            const startMile = parseFloat(document.getElementById('c_startMile').value) || 0;
            const endMile = parseFloat(document.getElementById('c_endMile').value) || 0;
            const distance = Math.max(0, endMile - startMile);
            document.getElementById('c_distance').value = distance;
        }

        // ยืนยันปิดงานส่งข้อมูลลง API
        function submitCloseJob() {
            const startMile = parseFloat(document.getElementById('c_startMile').value) || 0;
            const endMile = parseFloat(document.getElementById('c_endMile').value) || 0;
            const distance = parseFloat(document.getElementById('c_distance').value) || 0;
            const toll = parseFloat(document.getElementById('c_toll').value) || 0;
            const fuel = parseFloat(document.getElementById('c_fuel').value) || 0;
            const parking = parseFloat(document.getElementById('c_parking').value) || 0;
            const allowance = parseFloat(document.getElementById('c_allowance').value) || 0;
            const note = document.getElementById('c_note').value || '';

            if (endMile <= 0 || endMile < startMile) {
                Swal.fire('ข้อมูลเลขไมล์ไม่ถูกต้อง', '⚠️ กรุณาระบุเลขไมล์สิ้นสุดให้ถูกต้อง และจะต้องไม่น้อยกว่าเลขไมล์เริ่มต้น', 'warning');
                return;
            }

            Swal.fire({
                title: 'ยืนยันปิดงานวิ่งนี้?',
                html: `ระยะทางสะสมวิ่งได้: <b class="text-orange-600">${distance} กม.</b><br>ระบบจะทำการปิดงานและเก็บประวัติ`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'ใช่, ปิดงานเลย',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    const btn = document.getElementById('btnSubmitClose');
                    btn.disabled = true;
                    btn.innerText = 'กำลังบันทึก...';

                    google.script.run
                        .withSuccessHandler(function(result) {
                            btn.disabled = false;
                            btn.innerText = 'ยืนยันปิดงาน';
                            Swal.fire('บันทึกปิดงานแล้ว!', result, 'success');
                            closeModal();
                            refreshData();
                        })
                        .withFailureHandler(function(e) {
                            btn.disabled = false;
                            btn.innerText = 'ยืนยันปิดงาน';
                            Swal.fire('ข้อผิดพลาด', 'เกิดข้อผิดพลาดหลังบ้าน: ' + e, 'error');
                        })
                        .closeVanJob({
                            jobId: activeJobId,
                            startMile: startMile,
                            endMile: endMile,
                            distance: distance,
                            toll: toll,
                            fuel: fuel,
                            parking: parking,
                            allowance: allowance,
                            note: note
                        });
                }
            });
        }
    </script>
</body>
</html>
