    <script>
        function navigateTo(pageName) {
            showLoader('กำลังนำทาง...');
            
            google.script.run
                .withSuccessHandler(function(htmlContent) {
                    document.open();
                    document.write(htmlContent);
                    document.close();
                })
                .withFailureHandler(function(error) {
                    hideLoader();
                    showError('ข้อผิดพลาด', error.message || 'ไม่สามารถโหลดหน้านี้ได้');
                })
                .loadHtmlPage(pageName);
        }

        function submitForm(event) {
            event.preventDefault();
            
            // Validate form
            if (!document.getElementById('infirmaryForm').checkValidity()) {
                showWarning('ข้อมูลไม่ครบ', 'กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน');
                return;
            }

            // Prepare data
            const formData = new FormData(document.getElementById('infirmaryForm'));
            const data = {};
            for (let [key, value] of formData.entries()) {
                data[key] = value;
            }

            showLoader('กำลังบันทึกข้อมูล...');

            // Send to Google Apps Script
            google.script.run
                .withSuccessHandler(function(result) {
                    hideLoader();
                    showSuccess('สำเร็จ!', result);
                    setTimeout(() => {
                        document.getElementById('infirmaryForm').reset();
                        navigateTo('infirmary_dashboard');
                    }, 1500);
                })
                .withFailureHandler(function(error) {
                    hideLoader();
                    showError('ข้อผิดพลาด', error.message || 'ไม่สามารถบันทึกข้อมูล');
                })
                .saveINFLog(data);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            hideLoader();
        });
    </script>
