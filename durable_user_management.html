    <div id="pageLoader" class="loader-container">
        <div class="spinner"></div>
        <div class="mt-3 fw-bold text-secondary" id="loaderText">กำลังโหลดข้อมูลสมาชิก...</div>
    </div>

    <div class="container py-5 max-w-4xl" style="max-width: 1000px; margin: auto;">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 text-primary" style="color: #f97316 !important;"><i class="fas fa-users-cog me-2"></i>ระบบจัดการสมาชิก (User Roles)</h4>
                <button class="btn btn-outline-secondary btn-sm" onclick="navigateTo('durable_dashboard')">
                    <i class="fas fa-arrow-left me-1"></i> กลับหน้าหลัก
                </button>
            </div>
            <div class="card-body p-4 p-md-5">
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>อีเมล (G-mail)</th>
                                <th>ชื่อ (Name)</th>
                                <th>แผนก (Department)</th>
                                <th>เบอร์โทร (Tel)</th>
                                <th style="width: 150px;">สิทธิ์ (Role)</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <tr><td colspan="5" class="text-center text-muted py-3">กำลังโหลดข้อมูล...</td></tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let currentUserEmail = "";

        function navigateTo(pageName) {
            const loader = document.getElementById('pageLoader');
            if(loader) loader.classList.remove('loader-hidden');

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(function(htmlContent) {
                        document.open();
                        document.write(htmlContent);
                        document.close();
                    })
                    .withFailureHandler(function(error) {
                        alert('ไม่สามารถโหลดหน้าเว็บได้: ' + error);
                        if(loader) loader.classList.add('loader-hidden');
                    })
                    .loadHtmlPage(pageName); 
            } else {
                console.log("Navigate to: " + pageName);
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            const loader = document.getElementById('pageLoader');
            
            if (typeof google !== 'undefined' && google.script) {
                // 1. ดึงอีเมลของผู้ใช้งานปัจจุบันก่อน
                google.script.run
                    .withSuccessHandler(function(email) {
                        currentUserEmail = email; // เก็บอีเมลตัวเองไว้
                        
                        // 2. ดึงข้อมูลตารางสมาชิกมาแสดง
                        google.script.run
                            .withSuccessHandler(function(data) {
                                renderUserTable(data);
                                if(loader) loader.classList.add('loader-hidden');
                            })
                            .withFailureHandler(function(error) {
                                alert('เกิดข้อผิดพลาดในการดึงข้อมูล: ' + error);
                                if(loader) loader.classList.add('loader-hidden');
                            })
                            .getUserRoleData();
                    })
                    .withFailureHandler(function() {
                        // ถ้าดึงอีเมลไม่สำเร็จก็ดึงข้อมูลเลย
                        google.script.run
                            .withSuccessHandler(function(data) { renderUserTable(data); if(loader) loader.classList.add('loader-hidden'); })
                            .getUserRoleData();
                    })
                    .getCurrentUserEmail(); 
            } else {
                // Mockup อีเมลตัวเองตอนพรีวิว เพื่อทดสอบสิทธิ์ Assistant
                currentUserEmail = "assistant@tijthailand.org"; 
                const mockData = [
                    ["G-mail", "Name", "Department", "Tel", "Role"],
                    ["internship.aekkasit@tijthailand.org", "ว่าน", "TIJ", "0971217918", "Admin"],
                    ["assistant@tijthailand.org", "ผู้ช่วย", "IT", "0888888888", "Assistant"],
                    ["user.test@tijthailand.org", "ทดสอบ", "IT", "0812345678", "User"]
                ];
                renderUserTable(mockData);
                setTimeout(() => { if(loader) loader.classList.add('loader-hidden'); }, 500);
            }
        });

        // ฟังก์ชันวาดตารางสมาชิก และตรวจสอบสิทธิ์
        function renderUserTable(data) {
            const tbody = document.getElementById('userTableBody');
            
            if (!data || data.length <= 1) { 
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger py-3">ไม่พบข้อมูลสมาชิกในระบบ</td></tr>';
                return;
            }

            // 1. ค้นหาสิทธิ์ (Role) ของผู้ใช้งานปัจจุบัน
            let currentUserRole = "User";
            for (let i = 1; i < data.length; i++) {
                if (data[i][0] && data[i][0].trim() === currentUserEmail) {
                    currentUserRole = data[i][4] ? data[i][4].trim() : "User";
                    break;
                }
            }

            // 2. ตรวจสอบสิทธิ์การเข้าถึง (ปฏิเสธ User ไม่ให้เข้าจัดการสมาชิก)
            if (currentUserRole.toLowerCase() === "user") {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center text-danger py-5">
                            <i class="fas fa-user-lock fa-3x mb-3"></i>
                            <h5 class="fw-bold">ปฏิเสธการเข้าถึง</h5>
                            <p class="text-muted">คุณไม่มีสิทธิ์เข้าใช้งานในส่วนของผู้ดูแลระบบ</p>
                        </td>
                    </tr>
                `;
                return;
            }

            let html = '';
            data.forEach(function(row, index) {
                if (index === 0) return; // ข้ามหัวตาราง
                
                let userEmail = row[0] ? row[0].trim() : '';
                let userName = row[1] || '-';
                let userDept = row[2] || '-';
                let userTel = row[3] || '-';
                let roleStr = row[4] ? row[4].trim() : 'User';
                
                let roleHtml = '';
                let badgeClass = '';
                if (roleStr.toLowerCase() === 'admin') badgeClass = 'bg-danger';
                else if (roleStr.toLowerCase() === 'assistant') badgeClass = 'bg-warning text-dark';
                else badgeClass = 'bg-secondary';
                
                // --- ตรวจสอบเงื่อนไขในการแสดง Dropdown ---
                
                // เงื่อนไขที่ 1: แถวนี้คือตัวเอง (แสดงเฉพาะป้ายสถานะ)
                if (userEmail === currentUserEmail) {
                    roleHtml = `<span class="badge ${badgeClass} py-2 px-3">${roleStr}</span> <small class="text-muted d-block mt-1">(สิทธิ์ของคุณ)</small>`;
                } 
                // เงื่อนไขที่ 2: Assistant กำลังดูข้อมูลของ Admin หรือ Assistant ด้วยกัน (ห้ามแก้ไข)
                else if (currentUserRole.toLowerCase() === "assistant" && (roleStr.toLowerCase() === "admin" || roleStr.toLowerCase() === "assistant")) {
                    roleHtml = `<span class="badge ${badgeClass} py-2 px-3">${roleStr}</span>`;
                }
                // เงื่อนไขที่ 3: มีสิทธิ์แก้ไขได้ (Admin แก้ได้ทุกคน / Assistant แก้ได้เฉพาะ User)
                else {
                    let isAdmin = roleStr.toLowerCase() === 'admin' ? 'selected' : '';
                    let isAssistant = roleStr.toLowerCase() === 'assistant' ? 'selected' : '';
                    let isUser = roleStr.toLowerCase() === 'user' ? 'selected' : '';
                    
                    // หากเป็นแค่ Assistant จะไม่มีตัวเลือกให้ปรับใครเป็น Admin ได้
                    let adminOptionHtml = currentUserRole.toLowerCase() === 'admin' 
                        ? `<option value="Admin" ${isAdmin}>Admin</option>` 
                        : '';
                    
                    roleHtml = `
                        <select class="form-select form-select-sm border-warning shadow-sm" onchange="changeUserRole('${userEmail}', this.value)" style="cursor: pointer;">
                            ${adminOptionHtml}
                            <option value="Assistant" ${isAssistant}>Assistant</option>
                            <option value="User" ${isUser}>User</option>
                        </select>
                    `;
                }
                
                html += '<tr>';
                html += '<td class="fw-medium">' + userEmail + '</td>';
                html += '<td>' + userName + '</td>';
                html += '<td>' + userDept + '</td>';
                html += '<td>' + userTel + '</td>';
                html += '<td>' + roleHtml + '</td>';
                html += '</tr>';
            });
            
            tbody.innerHTML = html;
        }

        // ฟังก์ชันอัปเดตสิทธิ์เมื่อมีการเปลี่ยน Dropdown
        function changeUserRole(email, newRole) {
            const loader = document.getElementById('pageLoader');
            document.getElementById('loaderText').textContent = "กำลังอัปเดตสิทธิ์...";
            if(loader) loader.classList.remove('loader-hidden');

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(function() {
                        if(loader) loader.classList.add('loader-hidden');
                        document.getElementById('loaderText').textContent = "กำลังโหลดข้อมูลสมาชิก...";
                    })
                    .withFailureHandler(function(error) {
                        alert('เกิดข้อผิดพลาดในการอัปเดตสิทธิ์: ' + error);
                        if(loader) loader.classList.add('loader-hidden');
                        document.getElementById('loaderText').textContent = "กำลังโหลดข้อมูลสมาชิก...";
                    })
                    .updateUserRoleInSheet(email, newRole);
            } else {
                // จำลองการทำงานตอนพรีวิว
                setTimeout(() => {
                    if(loader) loader.classList.add('loader-hidden');
                    alert(`อัปเดตสิทธิ์ของ ${email} เป็น ${newRole} เรียบร้อยแล้ว`);
                    document.getElementById('loaderText').textContent = "กำลังโหลดข้อมูลสมาชิก...";
                }, 800);
            }
        }
    </script>
</body>
</html>
