    <div id="pageLoader" class="loader-container loader-hidden">

    <div class="container py-5 max-w-2xl" style="max-width: 800px; margin: auto;">
        
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                <h4 class="mb-0 text-primary" style="color: #f97316 !important;"><i class="fas fa-user-plus me-2"></i>เพิ่มสมาชิกใหม่ในระบบ</h4>

            <div class="card-body p-4 p-md-5 bg-white">
                <form id="addMemberForm">
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">อีเมล (G-mail) <span class="text-danger">*</span></label>
                        <input type="email" id="emailInput" class="form-control" placeholder="example@tijthailand.org" required>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-dark">ชื่อ-นามสกุล (Name) <span class="text-danger">*</span></label>
                            <input type="text" id="nameInput" class="form-control" placeholder="ระบุชื่อผู้ใช้งาน" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-dark">เบอร์โทรศัพท์ (Tel)</label>
                            <input type="tel" id="telInput" class="form-control" placeholder="08X-XXX-XXXX">
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-dark">แผนก/หน่วยงาน (Department) <span class="text-danger">*</span></label>
                            <select id="departmentInput" class="form-select" required>
                                <option value="" selected disabled>เลือกแผนก...</option>
                                <option value="OED">OED</option>
                                <option value="OSP">OSP</option>
                                <option value="OM">OM</option>
                                <option value="Academy">Academy</option>
                                <option value="OJI">OJI</option>
                                <option value="OBR">OBR</option>
                                <option value="EXPO">EXPO</option>
                                <option value="OPC">OPC</option>
                                <option value="KCS">KCS</option>
                                <option value="BSM">BSM</option>
                                <option value="IT">IT</option>
                                <option value="Other">อื่นๆ</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-dark">สิทธิ์การใช้งาน (Role) <span class="text-danger">*</span></label>
                            <select id="roleInput" class="form-select" required>
                                <option value="User" selected>User (ผู้ใช้งานทั่วไป)</option>
                                <option value="Assistant">Assistant (ผู้ช่วย)</option>

                    <hr class="text-muted opacity-25 my-4">

                    <div class="d-flex justify-content-end mt-4">

                        <button type="submit" class="btn text-white fw-bold shadow-sm px-5" style="background-color: #f97316;">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function navigateTo(pageName) {
            const loader = document.getElementById('pageLoader');
            document.getElementById('loaderText').textContent = "กำลังเปลี่ยนหน้า...";
            if(loader) loader.classList.remove('loader-hidden');

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(function(htmlContent) {
                        document.open();
                        document.write(htmlContent);
                        document.close();
                    })
                    .withFailureHandler(function(error) {
                        alert('ไม่สามารถโหลดหน้าเว็บได้: ' + error);
                        if(loader) loader.classList.add('loader-hidden');
                    })
                    .loadHtmlPage(pageName); 
            } else {
                console.log("Navigate to: " + pageName);
                if(loader) loader.classList.add('loader-hidden');
            }
        }

        // เมื่อกด Submit ฟอร์ม
        document.getElementById('addMemberForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // รวบรวมข้อมูล
            const formData = {
                email: document.getElementById('emailInput').value.trim(),
                name: document.getElementById('nameInput').value.trim(),
                department: document.getElementById('departmentInput').value,
                tel: document.getElementById('telInput').value.trim() || "-",
                role: document.getElementById('roleInput').value
            };

            const loader = document.getElementById('pageLoader');
            document.getElementById('loaderText').textContent = "กำลังบันทึกข้อมูลสมาชิก...";
            if(loader) loader.classList.remove('loader-hidden');

            // ส่งข้อมูลไปบันทึก
            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(function(response) {
                        alert('เพิ่มสมาชิกสำเร็จเรียบร้อยแล้ว!');
                        navigateTo('durable_user_management'); // กลับไปหน้าตารางสมาชิก
                    })
                    .withFailureHandler(function(error) {
                        alert('ไม่สามารถเพิ่มสมาชิกได้: ' + error.message);
                        if(loader) loader.classList.add('loader-hidden');
                    })
                    .addUserRoleData(formData); // ฟังก์ชันฝั่ง Server
            } else {
                // สำหรับพรีวิวในเบราว์เซอร์
                setTimeout(() => {
                    alert('จำลองการเพิ่มสมาชิกสำเร็จ!\n' + JSON.stringify(formData));
                    if(loader) loader.classList.add('loader-hidden');
                }, 800);
            }
        });
    </script>
</body>
