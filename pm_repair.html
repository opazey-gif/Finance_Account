<script>
  // ตัวแปรเก็บข้อมูล Dropdown ที่ดึงมาจาก Sheet
  let pmDropdownData = {};

  function initCascadingDropdowns() {
    const sys1 = document.getElementById('sys1');
    if (sys1) sys1.innerHTML = '<option value="">⏳ กำลังโหลดข้อมูล...</option>';    

    google.script.run
      .withSuccessHandler(function(data) {
        pmDropdownData = data || {};
        populateSystemDropdown();
      })
      .withFailureHandler(function(error) {
        alert("โหลดข้อมูล Dropdown ไม่สำเร็จ: " + (error.message || error));
      })
      .getDropdownData();
  }

  function populateSystemDropdown() {
    const sys1 = document.getElementById('sys1');
    if (!sys1) return;

    sys1.innerHTML = '<option value="">-- เลือกระบบ --</option>';

    for (let system in pmDropdownData) {
      if (system) {
        sys1.innerHTML += `<option value="${system}">${system}</option>`;
      }
    }
  }

  function onSystemChange() {
    const sys1Val = document.getElementById('sys1').value;
    const sys2 = document.getElementById('sys2');
    const sys3 = document.getElementById('sys3');
    const sys4 = document.getElementById('sys4');

    sys2.innerHTML = '<option value="">-- เลือกเครื่องจักร --</option>';
    sys3.innerHTML = '<option value="">-- เลือกเครื่องจักรย่อย --</option>';
    sys4.innerHTML = '<option value="">-- เลือกระบบประกอบเครื่องจักร --</option>';

    if (sys1Val && pmDropdownData[sys1Val]) {
      for (let machine in pmDropdownData[sys1Val]) {
        if (machine) {
          sys2.innerHTML += `<option value="${machine}">${machine}</option>`;
        }
      }
    }
  }

  function onMachineChange() {
    const sys1Val = document.getElementById('sys1').value;
    const sys2Val = document.getElementById('sys2').value;
    const sys3 = document.getElementById('sys3');
    const sys4 = document.getElementById('sys4');

    sys3.innerHTML = '<option value="">-- เลือกเครื่องจักรย่อย --</option>';
    sys4.innerHTML = '<option value="">-- เลือกระบบประกอบเครื่องจักร --</option>';

    if (sys1Val && sys2Val && pmDropdownData[sys1Val][sys2Val]) {
      for (let subMachine in pmDropdownData[sys1Val][sys2Val]) {
        if (subMachine) {
          sys3.innerHTML += `<option value="${subMachine}">${subMachine}</option>`;
        }
      }
    }
  }

  function onSubMachineChange() {
    const sys1Val = document.getElementById('sys1').value;
    const sys2Val = document.getElementById('sys2').value;
    const sys3Val = document.getElementById('sys3').value;
    const sys4 = document.getElementById('sys4');

    sys4.innerHTML = '<option value="">-- เลือกระบบประกอบเครื่องจักร --</option>';

    if (sys1Val && sys2Val && sys3Val && pmDropdownData[sys1Val][sys2Val][sys3Val]) {
      let components = pmDropdownData[sys1Val][sys2Val][sys3Val];
      components.forEach(comp => {
        if (comp) {
          sys4.innerHTML += `<option value="${comp}">${comp}</option>`;
        }
      });
    }
  }

  // ฟังก์ชันรวบรวมข้อมูลและส่งไปบันทึก
  function submitPMRepair(event) {
    if (event) event.preventDefault();

    const sys1 = document.getElementById('sys1').value;
    const sys2 = document.getElementById('sys2').value;
    const sys3 = document.getElementById('sys3') ? document.getElementById('sys3').value : '';
    const sys4 = document.getElementById('sys4') ? document.getElementById('sys4').value : '';

    if (!sys1 || !sys2) {
      alert('⚠️ กรุณาเลือกระบบและเครื่องจักรให้ครบถ้วนครับ');
      return;
    }

    const maintenanceDetails = document.getElementById('f_details') ? document.getElementById('f_details').value : '';
    const spareDetails = document.getElementById('f_spareDetails') ? document.getElementById('f_spareDetails').value : '';
    const price = document.getElementById('f_price') ? document.getElementById('f_price').value : '';
    const supervisor = document.getElementById('f_supervisor') ? document.getElementById('f_supervisor').value : '';
    const hasSpareParts = document.getElementById('f_hasSparePart') ? (document.getElementById('f_hasSparePart').value === 'มี' ? 'มีการเปลี่ยนอะไหล่' : 'ไม่มี') : '';
    const cycle = document.getElementById('f_cycle') ? document.getElementById('f_cycle').value : '';
    const startDate = document.getElementById('f_startDate') ? document.getElementById('f_startDate').value : '';
    const startTime = document.getElementById('f_startTime') ? document.getElementById('f_startTime').value : '';
    const cause = document.getElementById('f_cause') ? document.getElementById('f_cause').value : '';
    const prevention = document.getElementById('f_prevention') ? document.getElementById('f_prevention').value : '';
    const workerName = document.getElementById('f_workerName') ? document.getElementById('f_workerName').value : '';
    const workerType = document.getElementById('f_workerType') ? document.getElementById('f_workerType').value : '';

    const pmData = {
      sys1,
      sys2,
      sys3,
      sys4,
      maintenanceDetails,
      hasSpareParts,
      spareDetails,
      price,
      supervisor,
      cycle,
      startDate,
      startTime,
      cause,
      prevention,
      workerName,
      workerType
    };

    const btn = document.getElementById('btnSavePM') || (event && event.target);
    const originalText = btn ? btn.innerHTML : '';
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '⏳ กำลังบันทึก...';
    }

    google.script.run
      .withSuccessHandler(function(response) {
        alert(response);
        if (typeof navigateTo === 'function') {
          navigateTo('pm_dashboard');
        } else if (typeof closeModal === 'function') {
          closeModal();
        }
      })
      .withFailureHandler(function(error) {
        alert('❌ เกิดข้อผิดพลาด: ' + (error.message || error));
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = originalText;
        }
      })
      .savePMRepairLog(pmData);
  }

  // เรียกเมื่อโหลดหน้าเรียบร้อย
  setTimeout(initCascadingDropdowns, 500);
</script>
