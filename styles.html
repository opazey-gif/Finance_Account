<!-- ================================================================
     Common_CSS.html  ·  Master Stylesheet  (v2 – unified & fixed)
     ทุกหน้าในระบบ include ไฟล์นี้เพียงไฟล์เดียว
     ================================================================ -->

<!-- ===== FRAMEWORKS ===== -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

<!-- ===== FONTS ===== -->
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ================================================================
   1.  CSS VARIABLES  (unified — ทั้ง --primary-color และ --primary-orange
       ชี้ไปค่าเดียวกัน เพื่อ backward-compatibility)
   ================================================================ */
:root {
  /* --- Brand Colors --- */
  --primary-orange : #f97316;
  --primary-color  : #f97316;   /* alias (backward compat) */
  --primary-blue   : #0ea5e9;
  --secondary-color: #0ea5e9;   /* alias (backward compat) */

  /* --- Semantic Colors --- */
  --success        : #10b981;
  --success-color  : #10b981;   /* alias */
  --warning        : #f59e0b;
  --warning-color  : #f59e0b;   /* alias */
  --danger         : #ef4444;
  --danger-color   : #ef4444;   /* alias */
  --info           : #3b82f6;
  --info-color     : #3b82f6;   /* alias */

  /* --- Neutral --- */
  --text-dark      : #1e293b;
  --text-light     : #64748b;
  --bg-light       : #fffcf5;
  --border-light   : #e2e8f0;

  /* --- Utility --- */
  --secondary-yellow: #fef3c7;
  --accent-cream   : #fffcf5;
}

/* ================================================================
   2.  GLOBAL RESET
   ================================================================ */
* { font-family: 'Prompt', 'Kanit', sans-serif; }

body {
  background-color: var(--bg-light);
  color           : var(--text-dark);
  font-size       : 14px;
  line-height     : 1.6;
}

/* ================================================================
   3.  PAGE LOADER  (รองรับทั้ง class="loader-container" และ id="pageLoader")
   ================================================================ */
#pageLoader,
.loader-container {
  position        : fixed;
  inset           : 0;                          /* top/right/bottom/left = 0 */
  background-color: rgba(255, 255, 255, 0.95);
  z-index         : 9999;
  display         : none;                       /* ซ่อนไว้ก่อน */
  align-items     : center;
  justify-content : center;
  flex-direction  : column;
  backdrop-filter : blur(4px);
  transition      : opacity .3s ease, visibility .3s ease;
}

#pageLoader.show,
.loader-container.show {
  display: flex !important;
}

.loader-hidden {
  opacity   : 0 !important;
  visibility: hidden !important;
}

.spinner {
  width       : 56px;
  height      : 56px;
  border      : 5px solid #f3f3f3;
  border-top  : 5px solid var(--primary-orange);
  border-radius: 50%;
  animation   : spin 0.9s linear infinite;
}

@keyframes spin {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loader-message {
  margin-top : 14px;
  font-weight: 600;
  color      : #64748b;
  font-size  : .9rem;
}

/* ================================================================
   4.  NAVBAR / HEADER
   ================================================================ */
.navbar-custom,
.navbar-tij {
  background    : #ffffff;
  border-bottom : 4px solid var(--primary-orange);
  padding       : .9rem 0;
  box-shadow    : 0 4px 15px rgba(249,115,22,.1);
  position      : sticky;
  top           : 0;
  z-index       : 1000;
}

.navbar-custom .navbar-brand,
.navbar-tij .navbar-brand {
  font-weight: 700;
  color      : var(--primary-orange) !important;
  font-size  : 1.3rem;
}

.user-info-box,
.user-badge {
  background   : var(--secondary-yellow);
  padding      : 10px 18px;
  border-radius: 14px;
  border-left  : 5px solid var(--primary-blue);
  font-size    : .85rem;
  font-weight  : 500;
}

/* Page header bar */
.page-header {
  background   : white;
  border-bottom: 3px solid var(--primary-orange);
  padding      : 1rem 0;
  margin-bottom: 1.5rem;
  box-shadow   : 0 2px 10px rgba(249,115,22,.08);
  position     : sticky;
  top          : 0;
  z-index      : 100;
}

/* ================================================================
   5.  CARDS
   ================================================================ */
.card {
  border       : 1px solid var(--border-light);
  border-radius: 1.25rem;
  box-shadow   : 0 4px 15px rgba(0,0,0,.05);
  transition   : all .3s ease;
}
.card:hover {
  transform : translateY(-5px);
  box-shadow: 0 8px 25px rgba(0,0,0,.1);
}

/* Menu card (main page) */
.menu-card {
  position     : relative;
  background   : white;
  border-radius: 1.25rem;
  border       : 1px solid var(--border-light);
  padding      : 1.5rem 1.5rem 1.5rem 2rem;
  box-shadow   : 0 4px 15px rgba(0,0,0,.04);
  transition   : all .3s ease;
  overflow     : hidden;
  cursor       : pointer;
}
.menu-card:hover {
  transform : translateY(-6px);
  box-shadow: 0 12px 28px rgba(249,115,22,.15);
  border-color: var(--primary-orange);
}
.card-accent {
  position     : absolute;
  top          : 0;
  left         : 0;
  width        : 5px;
  height       : 100%;
  border-radius: 1.25rem 0 0 1.25rem;
}
.menu-card-title {
  font-weight: 700;
  font-size  : 1rem;
  color      : var(--text-dark);
  margin-bottom: .25rem;
}
.menu-card-desc {
  font-size: .82rem;
  color    : var(--text-light);
}
.icon-container {
  padding      : .65rem;
  border-radius: .75rem;
}

/* KPI / Stat cards */
.kpi-card,
.stat-card {
  background   : white;
  border-radius: 1.25rem;
  padding      : 1.5rem;
  box-shadow   : 0 4px 15px rgba(0,0,0,.04);
  border       : 1px solid var(--border-light);
  transition   : all .3s ease;
}
.kpi-card:hover,
.stat-card:hover {
  transform : translateY(-4px);
  box-shadow: 0 10px 25px rgba(0,0,0,.08);
}
.kpi-value,
.stat-value {
  font-size  : 2.4rem;
  font-weight: 700;
  line-height: 1.1;
  color      : var(--primary-orange);
}
.kpi-label,
.stat-label {
  font-size     : .82rem;
  color         : var(--text-light);
  font-weight   : 500;
  text-transform: uppercase;
  letter-spacing: .04em;
}

.kpi-card.warning .kpi-value { color: var(--warning-color); }
.kpi-card.danger  .kpi-value { color: var(--danger-color); }
.kpi-card.info    .kpi-value { color: var(--info-color); }
.kpi-card.success .kpi-value { color: var(--success-color); }

/* Section headers */
.section-header {
  display      : flex;
  align-items  : center;
  gap          : 10px;
  margin-bottom: 1.5rem;
  padding-bottom: .75rem;
  border-bottom: 2px solid var(--border-light);
}
.section-header-icon {
  width        : 36px;
  height       : 36px;
  border-radius: 10px;
  background   : rgba(249,115,22,.1);
  display      : flex;
  align-items  : center;
  justify-content: center;
  color        : var(--primary-orange);
  font-size    : 1.1rem;
}
.section-header h5 {
  margin     : 0;
  font-weight: 700;
  color      : var(--text-dark);
}

/* ================================================================
   6.  BUTTONS
   ================================================================ */
.btn-primary {
  background-color: var(--primary-orange);
  border-color    : var(--primary-orange);
  font-weight     : 600;
  border-radius   : 10px;
  transition      : all .3s ease;
}
.btn-primary:hover {
  background-color: #ea580c;
  border-color    : #ea580c;
  transform       : translateY(-2px);
  box-shadow      : 0 6px 15px rgba(249,115,22,.3);
}
.btn-secondary {
  background-color: var(--primary-blue);
  border-color    : var(--primary-blue);
  font-weight     : 600;
  border-radius   : 10px;
}
.btn-secondary:hover {
  background-color: #0284c7;
  border-color    : #0284c7;
}

.btn-orange {
  background : var(--primary-orange);
  color      : white;
  border     : none;
  padding    : 10px 20px;
  border-radius: 12px;
  font-weight: 600;
  transition : all .3s ease;
  cursor     : pointer;
}
.btn-orange:hover {
  background: #ea580c;
  transform : translateY(-2px);
  box-shadow: 0 6px 15px rgba(249,115,22,.3);
  color     : white;
}
.btn-blue {
  background : var(--primary-blue);
  color      : white;
  border     : none;
  padding    : 10px 20px;
  border-radius: 12px;
  font-weight: 600;
  transition : all .3s ease;
  cursor     : pointer;
}
.btn-blue:hover {
  background: #0284c7;
  transform : translateY(-2px);
  box-shadow: 0 6px 15px rgba(14,165,233,.3);
  color     : white;
}

/* ================================================================
   7.  FORMS
   ================================================================ */
.form-label {
  font-weight  : 600;
  color        : var(--text-dark);
  margin-bottom: 8px;
  font-size    : .9rem;
}
.form-control,
.form-select {
  border       : 1px solid var(--border-light);
  border-radius: 10px;
  padding      : 10px 14px;
  font-size    : .9rem;
  transition   : all .3s ease;
}
.form-control:focus,
.form-select:focus {
  border-color: var(--primary-orange);
  box-shadow  : 0 0 0 4px rgba(249,115,22,.12);
}
.form-section {
  background   : #fafafa;
  border       : 1px solid var(--border-light);
  border-radius: 1rem;
  padding      : 1.5rem;
  margin-bottom: 1.25rem;
}
.section-title {
  font-weight  : 700;
  color        : var(--primary-orange);
  border-bottom: 2px solid var(--primary-orange);
  padding-bottom: .4rem;
  margin-bottom : 1rem;
  font-size    : .95rem;
}
.inner-box {
  background   : #fff8f0;
  border       : 1px solid #fed7aa;
  border-radius: .75rem;
  padding      : 1rem;
}

/* ================================================================
   8.  TABLES
   ================================================================ */
.table { border-collapse: collapse; font-size: .9rem; }
.table thead {
  background  : #f8fafc;
  border-bottom: 2px solid var(--border-light);
}
.table thead th {
  font-weight   : 700;
  color         : var(--text-dark);
  padding       : 12px 14px;
  font-size     : .8rem;
  text-transform: uppercase;
  letter-spacing: .03em;
  white-space   : nowrap;
}
.table tbody td {
  padding      : 12px 14px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}
.table tbody tr:last-child td { border-bottom: none; }
.table tbody tr:hover { background: rgba(249,115,22,.03); }

.table-card {
  background   : white;
  border-radius: 1.25rem;
  overflow     : hidden;
  box-shadow   : 0 4px 15px rgba(0,0,0,.04);
  border       : 1px solid var(--border-light);
}
.table-card .table { margin-bottom: 0; }

/* ================================================================
   9.  STATUS PILLS / BADGES
   ================================================================ */
.badge { padding: 6px 12px; border-radius: 8px; font-weight: 600; font-size: .78rem; }
.pill {
  display     : inline-flex;
  align-items : center;
  gap         : 5px;
  padding     : 4px 12px;
  border-radius: 999px;
  font-size   : .78rem;
  font-weight : 600;
}
.pill-pending  { background:#fef3c7; color:#b45309; }
.pill-accepted { background:#dbeafe; color:#1d4ed8; }
.pill-done     { background:#d1fae5; color:#065f46; }
.pill-danger   { background:#fee2e2; color:#b91c1c; }

/* ================================================================
   10.  GRADIENT HEADER BOX
   ================================================================ */
.gradient-header {
  background   : linear-gradient(135deg, var(--primary-orange) 0%, #fb923c 100%);
  color        : white;
  padding      : 1.5rem;
  border-radius: 1.25rem;
  margin-bottom: 1.5rem;
  box-shadow   : 0 8px 20px rgba(249,115,22,.2);
}
.gradient-header h3,
.gradient-header h4 { color: white; margin: 0; font-weight: 700; }
.gradient-header p  { color: rgba(255,255,255,.85); margin: .25rem 0 0; font-size: .875rem; }

/* ================================================================
   11.  UTILITY
   ================================================================ */
.text-muted      { color: var(--text-light) !important; }
.border-orange   { border-color: var(--primary-orange) !important; }
.bg-orange-light { background-color: rgba(249,115,22,.1) !important; }
.bg-primary-light{ background-color: rgba(249,115,22,.1) !important; }
.shadow-custom   { box-shadow: 0 10px 25px -5px rgba(0,0,0,.04) !important; }
.hover-up:hover  { transform: translateY(-10px); box-shadow: 0 8px 25px rgba(0,0,0,.15); }

/* ================================================================
   12.  RESPONSIVE
   ================================================================ */
@media (max-width: 768px) {
  body { font-size: 13px; }
  .container-fluid { padding: 1rem; }
  .btn  { padding: 9px 12px; font-size: .9rem; }
  .form-control, .form-select { font-size: 16px; } /* prevent iOS zoom */
}

/* ================================================================
   13.  ROLE-BASED VISIBILITY  (ควบคุมด้วย class บน <body>)
        body.role-admin   → แสดง .admin-only
        body.role-driver  → แสดง .driver-only
        body.role-admin แสดง .driver-only ด้วย (admin ทำได้ทุกอย่าง)
   ================================================================ */
.admin-only,
.driver-only {
  display: none !important;   /* ซ่อนไว้ก่อนเสมอ */
}

body.role-admin  .admin-only  { display: inline-flex !important; }
body.role-admin  .driver-only { display: inline-flex !important; }
body.role-driver .driver-only { display: inline-flex !important; }
</style>
