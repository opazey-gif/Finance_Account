    <script>

        // ฟังก์ชันสำหรับเปลี่ยนหน้าเว็บแบบไร้รอยต่อ (SPA) แก้ปัญหาจอขาวและโหลดช้า
        function navigateTo(pageName) {
            // 1. แสดงหน้าต่างโหลดบังไว้ก่อน
            document.getElementById('pageLoader').style.display = 'flex';
            
            // 2. เรียกไปที่ฟังก์ชันดึง HTML จากฝั่ง Connect.js มาเขียนทับ (ไม่เกิดการรีเฟรชหน้าจอ)
            google.script.run
                .withSuccessHandler(function(htmlContent) {
                    document.open();
                    document.write(htmlContent);
                    document.close();
                })
                .withFailureHandler(function(error) {
                    alert('ไม่สามารถโหลดหน้าเว็บได้: ' + error);
                    document.getElementById('pageLoader').style.display = 'none';
                })
                .loadHtmlPage(pageName); // เรียกฟังก์ชันใน Connect.js
        }

        function checkTravelType() {
            const selectBox = document.getElementById("traveltype");
            const otherDiv = document.getElementById("otherTravelDiv");
            otherDiv.style.display = (selectBox.value === "อื่นๆ") ? "block" : "none";
        }

        // ฟังก์ชันแสดงตัวอย่างไฟล์ที่เลือก
        const fileInput = document.getElementById('receiptFile');
        const filePreview = document.getElementById('filePreview');
        const dropZone = fileInput.parentElement;

        function validateAndPreviewFile(file) {
            if (!file) return;
            
            const maxSize = 5 * 1024 * 1024; // 5 MB
            const fileSize = (file.size / 1024 / 1024).toFixed(2);
            
            if (fileSize > 5) {
                alert('⚠️ ไฟล์ใหญ่เกินไป! (มากกว่า 5 MB)');
                fileInput.value = '';
                filePreview.innerHTML = '';
                return false;
            }
            
            const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'application/pdf'];
            if (!validTypes.includes(file.type)) {
                alert('⚠️ ต้องเป็นไฟล์ JPG, PNG, GIF หรือ PDF เท่านั้น');
                fileInput.value = '';
                filePreview.innerHTML = '';
                return false;
            }
            
            // แสดงตัวอย่างไฟล์
            filePreview.innerHTML = `<div class="text-sm bg-green-50 text-green-700 p-3 rounded-lg border border-green-200 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span><strong>✓ ${file.name}</strong> (${fileSize} MB)</span>
            </div>`;
            return true;
        }

        fileInput?.addEventListener('change', function(e) {
            const file = e.target.files[0];
            validateAndPreviewFile(file);
        });

        // Drag and Drop functionality
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-blue-100', 'border-blue-500');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-blue-100', 'border-blue-500');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-blue-100', 'border-blue-500');
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                validateAndPreviewFile(file);
            }
        });

        function submitForm() {
            const btn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status-msg');
            const selectedType = document.getElementById('traveltype').value;
            let finalTravelType = selectedType;

            if (selectedType === "อื่นๆ") finalTravelType = document.getElementById('otherTravelType').value;
            
            const data = {
                email: document.getElementById('email').value,
                name: document.getElementById('name').value,
                department: document.getElementById('department').value,
                travelDate: document.getElementById('travelDate').value,
                traveltype: finalTravelType,
                purpose: document.getElementById('purpose').value,
                amount: document.getElementById('amount').value
            };

            if(!data.email || !data.name || !data.department || !data.travelDate || !data.traveltype || !data.purpose || !data.amount) {
                statusDiv.className = "text-center mt-4 text-red-500 text-sm font-medium";
                statusDiv.innerHTML = "⚠️ กรุณากรอกข้อมูลให้ครบทุกช่อง";
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            statusDiv.className = "text-center mt-4 text-amber-500 text-sm font-medium animate-pulse";
            statusDiv.innerHTML = "⏳ กำลังบันทึกข้อมูล...";

            // ดึงไฟล์ถ้ามี
            const fileInput = document.getElementById('receiptFile');
            const selectedFile = fileInput && fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;

            if (selectedFile) {
                // ถ้ามีไฟล์ให้ส่งผ่าน uploadFile()
                const fileName = selectedFile.name;
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const fileContent = e.target.result; // Base64 string
                    
                    console.log("📤 เตรียมส่ง: " + fileName);
                    console.log("📦 ขนาด: " + fileContent.length + " bytes");
                    
                    statusDiv.className = "text-center mt-4 text-blue-500 text-sm font-medium animate-pulse";
                    statusDiv.innerHTML = "⏳ กำลังอัปโหลดไฟล์...";
                    
                    google.script.run
                        .withSuccessHandler(function(fileUrl) {
                            console.log("✅ อัปโหลดสำเร็จ: " + fileUrl);
                            data.receiptUrl = fileUrl;
                            saveClaim(data, btn, statusDiv);
                        })
                        .withFailureHandler(function(err) {
                            console.error("❌ อัปโหลดไม่สำเร็จ: " + err);
                            statusDiv.className = "text-center mt-4 text-red-500 text-sm";
                            statusDiv.innerHTML = "❌ อัปโหลดไฟล์ไม่สำเร็จ: " + err;
                            btn.disabled = false;
                            btn.classList.remove('opacity-50', 'cursor-not-allowed');
                        })
                        .uploadReceiptFile(fileName, fileContent);
                };
                
                reader.onerror = function(err) {
                    console.error("❌ FileReader Error: " + err.message);
                    statusDiv.className = "text-center mt-4 text-red-500 text-sm";
                    statusDiv.innerHTML = "❌ ไม่สามารถอ่านไฟล์: " + err.message;
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                };
                
                reader.readAsDataURL(selectedFile);
            } else {
                // ไม่มีไฟล์ให้บันทึกปกติ
                console.log("ℹ️ ไม่มีไฟล์, บันทึกปกติ");
                saveClaim(data, btn, statusDiv);
            }
        }

        function saveClaim(data, btn, statusDiv) {
            google.script.run
                .withSuccessHandler(function(response) {
                    statusDiv.className = "text-center mt-4 text-emerald-500 text-sm font-bold bg-emerald-50 py-2 rounded-lg border border-emerald-100";
                    statusDiv.innerHTML = "✅ " + response; 
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    
                    ['travelDate', 'traveltype', 'otherTravelType', 'purpose', 'amount', 'receiptFile'].forEach(id => {
                        const elem = document.getElementById(id);
                        if (elem) elem.value = '';
                    });
                    document.getElementById('otherTravelDiv').style.display = 'none';
                    document.getElementById('filePreview').innerHTML = '';

                    alert("บันทึกข้อมูลสำเร็จ!\n" + response); 
                    
                    sessionStorage.setItem('openHistoryTab', 'true'); 
                    navigateTo('dashboard');
                })
                .withFailureHandler(function(err) {
                    statusDiv.className = "text-center mt-4 text-red-500 text-sm";
                    statusDiv.innerHTML = "❌ เกิดข้อผิดพลาด: " + err;
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                })
                .saveClaim(data);
        }
    </script>
